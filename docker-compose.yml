services:
  postgres:
    image: postgres:16-alpine
    container_name: ligo-wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-ligo}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ligo_password}
      POSTGRES_DB: ${DATABASE_NAME:-wallet_service}
    ports:
      - '${DATABASE_PORT:-5434}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-ligo} -d ${DATABASE_NAME:-wallet_service}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ligo-wallet-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      CORS_ORIGIN: '*'
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-ligo}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-ligo_password}
      DATABASE_NAME: ${DATABASE_NAME:-wallet_service}
      DATABASE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      AUTH_MOCK_USERNAME: ${AUTH_MOCK_USERNAME:-senior.backend}
      AUTH_MOCK_PASSWORD: ${AUTH_MOCK_PASSWORD:-Password123}
    ports:
      - '${PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
